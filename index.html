<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDLE CASINO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">

    <div id="floor-section">
      <div id="hud">
        <div id="hud-left">
          <span id="balance-display">$0</span>
          <div id="hud-earnings">
            <div class="earn-row">
              <span class="earn-label">1M</span>
              <span class="earn-val" id="earn-prev-1m">--</span>
              <span class="earn-sep">|</span>
              <span class="earn-val" id="earn-curr-1m">$0</span>
            </div>
            <div class="earn-row">
              <span class="earn-label">5M</span>
              <span class="earn-val" id="earn-prev-5m">--</span>
              <span class="earn-sep">|</span>
              <span class="earn-val" id="earn-curr-5m">$0</span>
            </div>
            <div class="earn-row">
              <span class="earn-label">1H</span>
              <span class="earn-val" id="earn-prev-1h">--</span>
              <span class="earn-sep">|</span>
              <span class="earn-val" id="earn-curr-1h">$0</span>
            </div>
          </div>
        </div>
      </div>
      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
        <canvas id="crt-canvas"></canvas>
        <!-- overlay panels are injected here by ui.js -->
      </div>
    </div>

    <div id="shop-panel">
      <div id="shop-header">
        <div id="shop-title">CASINO</div>
        <div id="shop-stats">
          <div id="status-money">$0</div>
          <div id="status-rate" class="rate-zero">- $0/s</div>
        </div>
      </div>

      <div id="crowd-section">
        <div id="crowd-count">CROWD  0 / 20</div>
        <div id="crowd-bar"><div id="crowd-bar-fill"></div></div>
        <div id="crowd-mult">1.00x WAGER</div>
        <div class="crowd-hint">CLICK FLOOR TO FILL</div>
      </div>

      <div id="status-hints">
        <div class="hint-row">CLICK SUPERCOMPUTER</div>
        <div class="hint-row">TO OPEN UPGRADES</div>
        <div class="hint-row hint-dim">CLICK MACHINE TO UPGRADE</div>
      </div>

      <div id="shop-footer">
        <div id="hud-earnings-side">
          <div class="earn-row">
            <span class="earn-label">1M</span>
            <span class="earn-val" id="earn-prev-1m-s">--</span>
            <span class="earn-sep">|</span>
            <span class="earn-val" id="earn-curr-1m-s">$0</span>
          </div>
          <div class="earn-row">
            <span class="earn-label">5M</span>
            <span class="earn-val" id="earn-prev-5m-s">--</span>
            <span class="earn-sep">|</span>
            <span class="earn-val" id="earn-curr-5m-s">$0</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/constants.js"></script>
  <script src="js/iso.js"></script>
  <script src="js/state.js"></script>
  <script src="js/particle.js"></script>
  <script src="js/machine.js"></script>
  <script src="js/customer.js"></script>
  <script src="js/floor.js"></script>
  <script src="js/supercomputer.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/crt.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/input.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
